{% extends 'master/base.html' %}
{% load crispy_forms_tags %}

{% block title %}
    {{title}}
{% endblock title %}



{% block content %}
<h1>{{form_title}}</h1>
    <form  method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{form_data | crispy}}
        <button type="submit">{{form_btn}} </button>
    </form>
{% endblock content %}
